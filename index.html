<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSO — مساعدك الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --light-grey: #f9f9f9;
            --border-color: #e5e5e5;
            --text-main: #374151;
            --user-bg: #f7f7f8;
            --accent-blue: #10a37f; /* لون ChatGPT الأخضر الشهير أو الأزرق حسب رغبتك */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--white);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /*Sidebar - يختفي في الجوال لسهولة الاستخدام */
        .sidebar {
            width: 260px;
            background-color: #202123;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 10px;
            transition: all 0.3s;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
        }

        .new-chat {
            border: 1px solid #4d4d4f;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            text-align: center;
            transition: 0.3s;
        }
        .new-chat:hover { background-color: #2b2c2f; }

        /* Main Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message-row {
            padding: 24px 15%;
            width: 100%;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        @media (max-width: 768px) {
            .message-row { padding: 20px 5%; }
        }

        .message-row.user {
            background-color: var(--white);
        }

        .message-row.ai {
            background-color: var(--user-bg);
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .user .avatar { background-color: #5436da; color: white; }
        .ai .avatar { background-color: #10a37f; color: white; }

        .text {
            line-height: 1.6;
            font-size: 16px;
            word-wrap: break-word;
            width: 100%;
        }

        /* Input Area */
        .input-wrapper {
            padding: 20px 15%;
            background: linear-gradient(transparent, white 20%);
        }

        @media (max-width: 768px) {
            .input-wrapper { padding: 10px 5%; }
        }

        .input-box {
            position: relative;
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            padding: 10px 15px;
        }

        textarea {
            width: 100%;
            border: none;
            outline: none;
            resize: none;
            font-family: inherit;
            font-size: 16px;
            max-height: 200px;
            padding: 5px;
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--accent-blue);
            cursor: pointer;
            font-size: 20px;
            padding-right: 10px;
        }
        
        .send-btn:disabled { color: #ccc; }

        /* تجميل السكرول بار */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #c5c5d2; border-radius: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="new-chat" onclick="location.reload()">+ محادثة جديدة</div>
        <div style="margin-top: auto; font-size: 14px; color: #8e8ea0; text-align: center;">
            VSO AI v2.0
        </div>
    </aside>

    <main class="main-content">
        <div class="chat-container" id="chat">
            <div class="message-row ai">
                <div class="avatar">V</div>
                <div class="text">مرحباً! أنا VSO، كيف يمكنني مساعدتك اليوم؟</div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-box">
                <textarea id="userInput" rows="1" placeholder="اسأل VSO عن أي شيء..." oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="send()">✈</button>
            </div>
            <p style="text-align: center; font-size: 12px; color: #8e8ea0; margin-top: 10px;">
                VSO قد يخطئ أحياناً، يرجى التحقق من المعلومات المهمة.
            </p>
        </div>
    </main>

<script>
    let history = [];

    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    async function send() {
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const text = input.value.trim();
        
        if(!text) return;

        // تعطيل الإدخال أثناء الإرسال
        input.value = '';
        input.style.height = 'auto';
        btn.disabled = true;

        append('user', text);
        
        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text, history: history})
            });
            const data = await res.json();

            if(data.reply) {
                append('ai', data.reply);
                history.push({role:'user', content:text}, {role:'assistant', content:data.reply});
            } else {
                append('ai', "عذراً، حدث خطأ في معالجة الرد.");
            }
        } catch (e) {
            append('ai', "تعذر الاتصال بالسيرفر، تأكد من تشغيل Render.");
        }
        
        btn.disabled = false;
    }

    function append(role, text) {
        const chat = document.getElementById('chat');
        const char = role === 'user' ? '👤' : 'V';
        const rowClass = role === 'user' ? 'user' : 'ai';
        
        const html = `
            <div class="message-row ${rowClass}">
                <div class="avatar">${char}</div>
                <div class="text">${text.replace(/\n/g, '<br>')}</div>
            </div>
        `;
        chat.innerHTML += html;
        chat.scrollTop = chat.scrollHeight;
    }

    // دعم زر Enter للإرسال
    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });
</script>
</body>
</html>
