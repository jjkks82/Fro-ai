<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>VSO — مساعدك الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #ffffff; --sidebar: #f3f4f6; --accent: #2563eb; --text: #1f2937; --border: #e5e7eb; }
  body { background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; margin: 0; display: flex; height: 100vh; }
  .sidebar { width: 260px; background: var(--sidebar); border-left: 1px solid var(--border); padding: 20px; }
  .main { flex: 1; display: flex; flex-direction: column; }
  .header { padding: 15px; border-bottom: 1px solid var(--border); font-weight: bold; font-size: 20px; color: var(--accent); }
  .messages { flex: 1; overflow-y: auto; padding: 20px; }
  .bubble { max-width: 80%; padding: 12px; border-radius: 12px; margin-bottom: 15px; line-height: 1.6; }
  .ai { background: #f9fafb; border: 1px solid var(--border); align-self: flex-start; }
  .user { background: var(--accent); color: white; align-self: flex-end; margin-right: auto; }
  .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  textarea { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; resize: none; outline: none; }
  button { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
  <aside class="sidebar"><h2>VSO AI</h2><p>الذكاء في أبسط صوره</p></aside>
  <main class="main">
    <div class="header">VSO AI — محادثة ذكية</div>
    <div class="messages" id="chat"></div>
    <div class="input-area">
      <textarea id="userInput" rows="1" placeholder="اكتب رسالتك هنا..."></textarea>
      <button onclick="send()">إرسال</button>
    </div>
  </main>
<script>
  let history = [];
  async function send() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if(!text) return;
    append('user', text);
    input.value = '';
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, history: history})
    });
    const data = await res.json();
    if(data.reply) {
      append('ai', data.reply);
      history.push({role:'user', content:text}, {role:'assistant', content:data.reply});
    }
  }
  function append(role, text) {
    const chat = document.getElementById('chat');
    chat.innerHTML += `<div class="bubble ${role}">${text}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }
</script>
</body>
</html>
