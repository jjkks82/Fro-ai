<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>زيد — مساعدك الذكي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  /* ===== RESET & VARS ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0d0f14;
    --sidebar-bg:  #111318;
    --surface:     #181c24;
    --surface2:    #1e2330;
    --border:      #2a2f3e;
    --accent:      #f0a500;
    --accent-dim:  rgba(240,165,0,0.12);
    --accent-glow: rgba(240,165,0,0.25);
    --user-bubble: #1a2540;
    --ai-bubble:   #181c24;
    --text:        #e8eaf0;
    --text-muted:  #6b7280;
    --text-dim:    #9ca3af;
    --radius:      14px;
    --font:        'Tajawal', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    overflow: hidden;
  }

  /* ===== LAYOUT ===== */
  .layout {
    display: flex;
    height: 100vh;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 14px;
    gap: 8px;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px 18px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .logo-text span {
    color: var(--accent);
  }

  .new-chat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    color: var(--accent);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }

  .new-chat-btn:hover {
    background: rgba(240,165,0,0.2);
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .sidebar-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 12px 4px;
    font-weight: 500;
  }

  .history-item {
    padding: 9px 12px;
    border-radius: 10px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-item:hover {
    background: var(--surface);
    color: var(--text);
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
  }

  /* ===== MAIN ===== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ===== HEADER ===== */
  .header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    flex-shrink: 0;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .model-badge {
    background: var(--accent-dim);
    border: 1px solid rgba(240,165,0,0.3);
    color: var(--accent);
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* ===== MESSAGES ===== */
  .messages-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    scroll-behavior: smooth;
  }

  .messages-wrap::-webkit-scrollbar { width: 5px; }
  .messages-wrap::-webkit-scrollbar-track { background: transparent; }
  .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* Empty State */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    animation: fadeIn 0.6s ease;
  }

  .empty-icon {
    width: 72px; height: 72px;
    background: var(--accent-dim);
    border: 2px solid rgba(240,165,0,0.3);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 40px var(--accent-glow);
  }

  .empty-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
  }

  .empty-title span { color: var(--accent); }

  .empty-sub {
    font-size: 14px;
    color: var(--text-muted);
    text-align: center;
    max-width: 340px;
    line-height: 1.7;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 560px;
    margin-top: 8px;
  }

  .suggestion-btn {
    padding: 9px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .suggestion-btn:hover {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Message Row */
  .msg-row {
    display: flex;
    gap: 14px;
    padding: 10px 28px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.ai-av {
    background: var(--accent);
    color: #000;
    font-weight: 700;
    font-size: 14px;
  }

  .avatar.user-av {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 72%;
    padding: 13px 17px;
    border-radius: var(--radius);
    line-height: 1.75;
    font-size: 14.5px;
    position: relative;
  }

  .bubble.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    border-top-right-radius: 4px;
  }

  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid #2a3d6b;
    color: var(--text);
    border-top-left-radius: 4px;
  }

  /* Code blocks */
  .bubble pre {
    background: #0a0c10;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 10px 0;
    font-size: 13px;
    direction: ltr;
    text-align: left;
  }

  .bubble code {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    background: rgba(255,255,255,0.06);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .bubble strong { color: var(--accent); font-weight: 600; }

  /* Typing indicator */
  .typing-bubble {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
  }

  .dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40%           { transform: scale(1);   opacity: 1; }
  }

  /* ===== INPUT AREA ===== */
  .input-area {
    padding: 16px 28px 20px;
    background: var(--bg);
    flex-shrink: 0;
  }

  .input-box {
    max-width: 900px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 12px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  #userInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14.5px;
    resize: none;
    max-height: 160px;
    line-height: 1.6;
    direction: rtl;
  }

  #userInput::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 38px; height: 38px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: #000;
    font-size: 17px;
  }

  .send-btn:hover:not(:disabled) {
    background: #ffbb20;
    box-shadow: 0 0 16px var(--accent-glow);
    transform: scale(1.05);
  }

  .send-btn:disabled {
    background: var(--border);
    color: var(--text-muted);
    cursor: not-allowed;
    transform: none;
  }

  .input-footer {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 10px;
  }

  /* ===== MOBILE ===== */
  @media (max-width: 680px) {
    .sidebar { display: none; }
    .msg-row { padding: 8px 14px; }
    .bubble { max-width: 86%; }
    .input-area { padding: 12px 14px 16px; }
    .header { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div class="logo-text"><span>زيد</span> AI</div>
    </div>

    <button class="new-chat-btn" onclick="clearChat()">
      <span>✦</span> محادثة جديدة
    </button>

    <div class="sidebar-label">المحادثات الأخيرة</div>
    <div id="historyList"></div>

    <div class="sidebar-footer">
      مدعوم بـ Groq × LLaMA 3<br>
      <span style="color:var(--accent)">70B</span> — أسرع نموذج
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="header">
      <span class="header-title">💬 محادثة مع زيد</span>
      <span class="model-badge">llama3-70b</span>
    </div>

    <div class="messages-wrap" id="messagesWrap">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <div class="empty-title">مرحباً، أنا <span>زيد</span></div>
        <div class="empty-sub">مساعدك الذكي — اسألني عن أي شيء باللغة العربية وسأجيبك على الفور.</div>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">ما هو الذكاء الاصطناعي؟</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">اكتب لي قصيدة عن الرياض</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">كيف أتعلم البرمجة؟</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">ما هي أفضل كتب التطوير الذاتي؟</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="إرسال">➤</button>
        <textarea id="userInput" rows="1" placeholder="اكتب رسالتك هنا..." 
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <div class="input-footer">اضغط Enter للإرسال • Shift+Enter لسطر جديد</div>
    </div>

  </main>
</div>

<script>
  let chatHistory = [];

  // ===== Auto-resize textarea =====
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  // ===== Enter key =====
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ===== Send suggestion =====
  function sendSuggestion(btn) {
    document.getElementById('userInput').value = btn.textContent;
    sendMessage();
  }

  // ===== Append message =====
  function appendMessage(role, text) {
    const wrap = document.getElementById('messagesWrap');
    
    // إخفاء الحالة الفارغة
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const av = document.createElement('div');
    av.className = `avatar ${role === 'ai' ? 'ai-av' : 'user-av'}`;
    av.textContent = role === 'ai' ? 'ز' : '👤';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = formatText(text);

    row.appendChild(av);
    row.appendChild(bubble);
    wrap.appendChild(row);
    wrap.scrollTop = wrap.scrollHeight;

    // حفظ في قائمة التاريخ الجانبي
    if (role === 'user') updateSidebarHistory(text);

    return bubble;
  }

  // ===== Typing indicator =====
  function showTyping() {
    const wrap = document.getElementById('messagesWrap');
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.id = 'typingRow';

    const av = document.createElement('div');
    av.className = 'avatar ai-av';
    av.textContent = 'ز';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ai typing-bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    row.appendChild(av);
    row.appendChild(bubble);
    wrap.appendChild(row);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typingRow');
    if (t) t.remove();
  }

  // ===== Format text (Markdown-lite) =====
  function formatText(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  // ===== Sidebar history =====
  function updateSidebarHistory(text) {
    const list = document.getElementById('historyList');
    const item = document.createElement('div');
    item.className = 'history-item';
    item.textContent = text.substring(0, 35) + (text.length > 35 ? '...' : '');
    list.insertBefore(item, list.firstChild);
    if (list.children.length > 10) list.removeChild(list.lastChild);
  }

  // ===== Clear chat =====
  function clearChat() {
    chatHistory = [];
    const wrap = document.getElementById('messagesWrap');
    wrap.innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <div class="empty-title">مرحباً، أنا <span>زيد</span></div>
        <div class="empty-sub">مساعدك الذكي — اسألني عن أي شيء باللغة العربية وسأجيبك على الفور.</div>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">ما هو الذكاء الاصطناعي؟</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">اكتب لي قصيدة عن الرياض</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">كيف أتعلم البرمجة؟</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">ما هي أفضل كتب التطوير الذاتي؟</button>
        </div>
      </div>`;
  }

  // ===== Main send function =====
  async function sendMessage() {
    const input = document.getElementById('userInput');
    const btn   = document.getElementById('sendBtn');
    const text  = input.value.trim();
    if (!text || btn.disabled) return;

    // إضافة رسالة المستخدم
    appendMessage('user', text);
    chatHistory.push({ role: 'user', content: text });

    // تهيئة الـ UI
    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: chatHistory.slice(-10) })
      });

      const data = await res.json();
      hideTyping();

      if (data.reply) {
        appendMessage('ai', data.reply);
        chatHistory.push({ role: 'assistant', content: data.reply });
      } else {
        appendMessage('ai', '⚠️ ' + (data.error || 'حدث خطأ غير متوقع.'));
      }
    } catch (err) {
      hideTyping();
      appendMessage('ai', '⚠️ تعذّر الاتصال بالسيرفر. تحقق من اتصالك وحاول مجدداً.');
      console.error(err);
    }

    btn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
